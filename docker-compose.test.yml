version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp_test
    networks:
      - test-network

  app:
    image: ${REGISTRY}/${IMAGE_NAME}/app:${TAG}
    environment:
      DB_HOST: postgres
      DB_PASSWORD: secret
      DB_NAME: myapp_test
    depends_on:
      - postgres
    networks:
      - test-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - test-network

networks:
  test-network: